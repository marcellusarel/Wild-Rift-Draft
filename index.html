<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#07080f;color:#e0e0f0;font-family:system-ui,sans-serif;min-height:100vh;padding-bottom:90px}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input{font-family:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#252540;border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes warn{0%,100%{opacity:1}50%{opacity:.6}}
.fade{animation:fadeIn .2s ease both}
.pulse{animation:pulse 1.5s infinite}
.warn{animation:warn 1.2s infinite}
</style>
</head>
<body>
<div id="app"></div>
<div id="clockWidget" style="position:fixed;top:8px;right:8px;z-index:9998;
  background:#0d0d1eee;border:1px solid #252540;border-radius:8px;
  padding:5px 10px;font-size:10px;line-height:1.4;color:#8a8aa0;
  text-align:right;pointer-events:none;backdrop-filter:blur(4px);
  padding-top:max(5px,env(safe-area-inset-top))"></div>
<script>
// Saat/tarih widget'ı — sağ üst köşe, her saniye güncellenir
(function(){
  const el = document.getElementById('clockWidget');
  function tick(){
    const now = new Date();
    const time = now.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const date = now.toLocaleDateString('tr-TR', {day:'2-digit',month:'2-digit',year:'numeric'});
    el.innerHTML = `<div style="font-weight:700;color:#e0e0f0">${time}</div><div>${date}</div>`;
  }
  tick();
  setInterval(tick, 1000);
})();
// file:// protokolü uyarısı — resimlerin çalışması için HTTP gerekli
if (location.protocol === 'file:') {
  document.addEventListener('DOMContentLoaded', () => {
    const b = document.createElement('div');
    b.innerHTML = `⚠️ Resimlerin görünmesi için dosyayı bir tarayıcıda <b>HTTP</b> üzerinden açın veya <a href="https://developer.chrome.com/docs/devtools" style="color:#4da6ff">Chrome'da izin verin</a>.`;
    b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1a0a00;color:#ffaa44;font-size:11px;padding:8px 12px;text-align:center;border-top:1px solid #ff880033';
    document.body.appendChild(b);
  });
}

// Riot sitesinden otomatik yama çek
async function fetchLatestPatch() {
  try {
    const res = await fetch("https://wildrift.leagueoflegends.com/tr-tr/news/tags/patch-notes/");
    const html = await res.text();
    const doc  = new DOMParser().parseFromString(html, "text/html");
    // En üstteki yama linkini al
    const links = [...doc.querySelectorAll("a[href*='patch-notes']")];
    const latest = links[0]?.href;
    if (!latest) return;

    // Versiyon çek
    const verMatch = latest.match(/(\d+-\d+[a-z]*)[^/]*$/);
    if (!verMatch) return;
    const ver = verMatch[1].replace(/-/g, ".").replace(/\.(\d+[a-z]?)$/, (m, p) => {
      return isNaN(p[0]) ? p : "." + p;
    });

    // Yama sayfasını çek
    const pRes = await fetch(latest);
    const pHtml = await pRes.text();
    const pDoc  = new DOMParser().parseFromString(pHtml, "text/html");
    const text  = pDoc.body.innerText || pDoc.body.textContent || "";

    // Tarih
    const dateMatch = text.match(/(\d{4}-\d{2}-\d{2})/);
    const date = dateMatch ? new Date(dateMatch[1]).toLocaleDateString("tr-TR", {
      day:"numeric", month:"long", year:"numeric"
    }) : "";

    // Şampiyon isimlerini tespit et — büyük harfle yazılan başlıkları ara
    const champNames = Object.values(DB).map(c => c.name.toUpperCase());
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

    let buffs = [], nerfs = [], changes = [];
    let currentSection = "";

    lines.forEach(line => {
      const up = line.toUpperCase();
      if (up.includes("GÜÇLENDİR") || up.includes("BUFF") || up.includes("ARTTIRIL")) currentSection = "buff";
      else if (up.includes("ZAYIFLAT") || up.includes("NERF") || up.includes("AZALTIL") || up.includes("DÜŞÜRÜL")) currentSection = "nerf";
      else if (up.includes("DENGE") || up.includes("AYARLAMA") || up.includes("CHANGE")) currentSection = "change";

      // Şampiyon ismi mi?
      const found = Object.entries(DB).find(([id, c]) => up === c.name.toUpperCase());
      if (found) {
        const normId = found[0].replace(/_.*$/, "");
        if (currentSection === "buff"   && !buffs.includes(normId))   buffs.push(normId);
        if (currentSection === "nerf"   && !nerfs.includes(normId))   nerfs.push(normId);
        if (currentSection === "change" && !changes.includes(normId)) changes.push(normId);
      }
    });

    // Güncelle (boşsa mevcut veriyi koru)
    if (buffs.length || nerfs.length || changes.length) {
      patchData = { version: ver||patchData.version, date: date||patchData.date,
        newChamps: patchData.newChamps||[], buffs, nerfs, changes,
        details: patchData.details||{} };
      render();
    }
  } catch(e) {
    console.log("Yama çekilemedi, mevcut veri kullanılıyor:", e.message);
  }
}

// DB key → normalize
function champNormName(id) {
  const c = DB[id];
  if (!c) return id.replace(/_.*$/,"");
  return c.name.toLowerCase().replace(/[^a-z0-9]/g,"");
}

// Patch durumu — DB key ile eşleştir
function getPatchStatus(id) {
  const base = id.replace(/_.*$/,"").toLowerCase();
  const name = champNormName(id);
  const match = (arr) => arr.some(b =>
    base === b || name === b || name.startsWith(b) || b.startsWith(base)
  );
  if (match(patchData.newChamps||[])) return "new";
  if (match(patchData.buffs))   return "buff";
  if (match(patchData.nerfs))   return "nerf";
  if (match(patchData.changes)) return "change";
  return null;
}

// Yama notu metni — aynı eşleştirme mantığı getPatchStatus ile
function getPatchDetail(id) {
  const base = id.replace(/_.*$/,"").toLowerCase();
  const name = champNormName(id);
  const keys = Object.keys(patchData.details||{});
  const key = keys.find(k => base===k || name===k || name.startsWith(k) || k.startsWith(base));
  return key ? (patchData.details[key]||"") : "";
}

// Yetenek bazlı, ayrıntılı yama notu (şampiyon detay sayfası için)
function getPatchDetailFull(id) {
  const base = id.replace(/_.*$/,"").toLowerCase();
  const name = champNormName(id);
  const keys = Object.keys(patchData.detailsFull||{});
  const key = keys.find(k => base===k || name===k || name.startsWith(k) || k.startsWith(base));
  return key ? (patchData.detailsFull[key]||null) : null;
}

// Rozet
function patchBadge(id, small=false) {
  const s = getPatchStatus(id);
  if (!s) return "";
  const cfg = {
    new:    {icon:"✨", color:"#ffcc02", bg:"#ffcc0218", border:"#ffcc0244", label:"Yeni"},
    buff:   {icon:"🔺", color:"#00ff88", bg:"#00ff8818", border:"#00ff8844", label:"Buff"},
    nerf:   {icon:"🔻", color:"#ff4444", bg:"#ff444418", border:"#ff444444", label:"Nerf"},
    change: {icon:"🔄", color:"#4da6ff", bg:"#4da6ff18", border:"#4da6ff44", label:"Denge"},
  }[s];
  if (small) return `<span style="font-size:11px" title="${cfg.label}">${cfg.icon}</span>`;
  return `<span style="font-size:7px;padding:1px 6px;border-radius:3px;font-weight:800;
    background:${cfg.bg};border:1px solid ${cfg.border};color:${cfg.color}">
    ${cfg.icon} ${cfg.label.toUpperCase()}
  </span>`;
}

// Fearless: önceki maçlarda sadece PICK yapılan şampiyonlar kilitlenir (ban'lar değil)
function getFearlessLocked() {
  if (!fearless) return new Set();
  const locked = new Set();
  matchHistory.forEach(m => {
    ORDER.forEach((o, i) => {
      const s = m.slots[i];
      if (s && o.act === "pick") locked.add(s.id);
    });
  });
  return locked;
}

// ─── YARDIMCILAR ─────────────────────────────────────────────
function getUsed() {
  const used = new Set();
  // Bir id eklendiğinde, aynı gerçek şampiyona ait diğer tüm lane key'lerini de ekle
  // (örn. camille picklenince camille_jg de otomatik kilitlenir).
  const addWithFlex = (id) => {
    used.add(id);
    const n = DB[id]?.name;
    if (n && NAME_TO_IDS[n]) NAME_TO_IDS[n].forEach(k => used.add(k));
  };
  slots.filter(Boolean).forEach(s => addWithFlex(s.id));
  getFearlessLocked().forEach(id => addWithFlex(id));
  return used;
}

function getMyPicks(team) {
  return slots.filter((s,i)=>s&&ORDER[i]?.act==="pick"&&ORDER[i]?.t===team).map(s=>({id:s.id,...DB[s.id]}));
}

function getEnPicks(team) { return getMyPicks(1-team); }

// ─── 3 BÖLÜMLÜ ÖNERİ MOTORU ─────────────────────────────────
function computeSugg() {
  if (step >= ORDER.length) return {ct:[],meta:[],filler:[],warns:[]};
  const cur  = ORDER[step];
  const myT  = cur.t;
  // Eğer taraf seçilmişse ve bu adım kullanıcının tarafı değilse boş öneri döndür
  if (mySide !== null && myT !== mySide) return {ct:[],meta:[],filler:[],warns:[],isEnemy:true};
  // Ban aşamasında öneri yok
  if (cur.act === "ban") return {ct:[],meta:[],filler:[],warns:[],isBan:true};
  const used = getUsed();

  const myPicks = getMyPicks(myT);
  const enPicks = getEnPicks(myT);

  // Kendi comfort picklerini düz set olarak topla (sadece tier 4 = senin picklerin)
  const COMFORT_POOL = COMFORT_IDS;

  // Son rakip pick
  const lastEn     = enPicks.length ? enPicks[enPicks.length-1] : null;
  const lastEnLane = lastEn ? lastEn.lanes[0] : null;

  // Kendi seçilen koridorlar
  const filledLanes = new Set(myPicks.flatMap(c=>c.lanes));

  // ── BÖLÜM 1: ROL BAZLI CT ────────────────────────────────
  let ctList = [];
  if (lastEn) {
    const enId = lastEn.id;
    const enData = DB[enId] || lastEn;
    const ctSet = new Set(enData.ct || []);
    ctList = ALL
      .filter(c => !used.has(c.id) && ctSet.has(c.id))
      .map(c => {
        const tierScore = getTier(c.id) * 3;
        const laneBonus = c.lanes.includes(lastEnLane) ? 4 : 0;
        const laneArr = META_POWER[lastEnLane] || [];
        const mi = laneArr.indexOf(c.id);
        const metaBonus = mi >= 0 ? (laneArr.length - mi) / laneArr.length * 2 : 0;
        const isComfort = COMFORT_POOL.has(c.id);
        const isBuff    = getPatchStatus(c.id) === "buff";
        const isNerf    = getPatchStatus(c.id) === "nerf";
        return {
          ...c,
          _score: 10 + tierScore + laneBonus + metaBonus
            + (isComfort ? 5 : 0)
            + (isBuff    ? 4 : 0)
            + (isNerf    ? -2 : 0),
          _why: lastEn.name + " CT",
          _comfort: isComfort,
          _patch: getPatchStatus(c.id),
        };
      })
      .sort((a,b) => b._score - a._score)
      .slice(0, 4);
  }

  // ── BÖLÜM 2: GENEL META GÜÇ PİCKLERİ ───────────────────
  // Tüm koridorların meta listesini tier'a göre birleştir
  const ctIds = new Set(ctList.map(c=>c.id));
  const allMetaFlat = Object.entries(META_POWER).flatMap(([ln, arr]) =>
    arr.map((id, i) => ({ id, lane: ln, metaRank: i, tier: getTier(id) }))
  );
  // Tekrar eden id'leri kaldır, tier > metaRank'e göre sırala
  const seen = new Set();
  const metaSorted = allMetaFlat
    .filter(x => DB[x.id] && !used.has(x.id) && !ctIds.has(x.id) && !seen.has(x.id) && seen.add(x.id))
    .sort((a,b) => (b.tier*100 - b.metaRank) - (a.tier*100 - a.metaRank));

  const metaList = metaSorted.slice(0, 4).map(x => ({
    ...DB[x.id], id: x.id,
    _why: "Meta Pick",
    _comfort: COMFORT_POOL.has(x.id),
    _patch: getPatchStatus(x.id),
  }));

  // ── BÖLÜM 3: BOŞ KORİDOR TAMAMLAMA ─────────────────────
  const allLanes  = ["Baron","Jungle","Mid","ADC","Support"];
  const emptyLanes = allLanes.filter(l => !filledLanes.has(l));
  const fillerIds  = new Set([...ctIds, ...metaList.map(c=>c.id)]);
  const fillerList = [];

  emptyLanes.forEach(el => {
    const laneArr = META_POWER[el] || [];
    const best = laneArr.find(id => DB[id] && !used.has(id) && !fillerIds.has(id));
    if (best) {
      fillerList.push({
        ...DB[best], id: best,
        _why: el + " İhtiyacı",
        _comfort: COMFORT_POOL.has(best),
        _patch: getPatchStatus(best),
      });
      fillerIds.add(best);
    }
  });

  // ── UYARILAR ─────────────────────────────────────────────
  const warns = [];
  if (myPicks.length >= 2) {
    const ap = myPicks.filter(c => ["AP","Hybrid"].includes(DB[c.id]?.dmg)).length;
    const ad = myPicks.filter(c => ["AD","Hybrid"].includes(DB[c.id]?.dmg)).length;
    const tk = myPicks.filter(c => ["Tank","Fighter","Engage"].includes(DB[c.id]?.cls)).length;
    if (ap < 1) warns.push("⚠️ AP Hasar İhtiyacı Var!");
    if (ad < 1) warns.push("⚠️ AD Hasar İhtiyacı Var!");
    if (tk < 1) warns.push("⚠️ Ön Hat / Tank İhtiyacı Var!");
  }

  return {ct:ctList, meta:metaList, filler:fillerList, warns};
}

}

// ddragon name map (CDragon'da olmayan yeni şampiyonlar için)
const DDRAGON_FALLBACK = {
  mel_adc:"Mel", mel:"Mel",
  aurelionsol_adc:"AurelionSol", orianna_adc:"Orianna",
  ziggs_adc:"Ziggs", yunara:"Yunara",
};
const DD_VER = "16.13.1";

function champImg(id, size=36) {
  const numId = CHAMP_ID[id];
  const r = Math.round(size * 0.22);
  const name = (DB[id]||{}).name || id;
  const initial = name.charAt(0).toUpperCase();
  const lc = LANE_COLOR[(DB[id]||{}).lanes?.[0]] || "#555";

  // Baş harf fallback div'i (arka plan)
  const fallbackDiv = `<span style="position:absolute;font-size:${Math.round(size*.42)}px;
    font-weight:800;color:${lc};z-index:1">${initial}</span>`;

  // Resim URL'si belirle
  let url = null;
  if (id === "camille" || id === "camille_jg") {
    url = CAMILLE_PHOTO;
  } else if (id === "norra") {
    url = NORRA_PHOTO;
  } else if (numId) {
    url = `${CDN}${numId}.png`;
  } else if (DDRAGON_FALLBACK[id]) {
    url = `https://ddragon.leagueoflegends.com/cdn/${DD_VER}/img/champion/${DDRAGON_FALLBACK[id]}.png`;
  }

  // Resim yoksa sadece baş harf
  if (!url) {
    return `<div style="width:${size}px;height:${size}px;border-radius:${r}px;
      background:#111128;flex-shrink:0;display:flex;align-items:center;
      justify-content:center;font-size:${Math.round(size*.42)}px;
      font-weight:800;color:${lc}">${initial}</div>`;
  }

  return `<div style="width:${size}px;height:${size}px;border-radius:${r}px;
    overflow:hidden;flex-shrink:0;background:#111128;position:relative;
    display:flex;align-items:center;justify-content:center">
    ${fallbackDiv}
    <img src="${url}" alt="" width="${size}" height="${size}"
      onerror="this.style.opacity='0'"
      style="border-radius:${r}px;object-fit:cover;object-position:top;
      position:relative;z-index:2;display:block"/>
  </div>`;
}
function _cdId(){ return 0; }

  }

  function buildPanelH() { return ""; }

  // ── Öneri paneli ─────────────────────────────────────────
  function suggH() {
    if (done) return "";
    // Rakip sırası
    if (sugg.isEnemy) {
      const enCol = cur.t===0?"#3a8fff":"#ff4d4d";
      const enLbl = cur.t===0?"🔵 Mavi":"🔴 Kırmızı";
      return `<div style="margin-bottom:10px;padding:18px;border-radius:10px;
        background:#0a0a18;border:1px solid ${enCol}18;text-align:center">
        <div style="font-size:20px;margin-bottom:6px">${cur.act==="ban"?"🚫":"⚔️"}</div>
        <div style="font-size:11px;font-weight:800;color:${enCol};letter-spacing:1px">
          ${enLbl} ${cur.act==="ban"?"BANLAMA":"SEÇİM"} SIRASI
        </div>
        <div style="font-size:9px;color:#333;margin-top:4px">Rakip hamlesi — öneri devre dışı</div>
      </div>`;
    }
    // Ban aşaması — öneri yok
    if (sugg.isBan) {
      const col = cur.t===0?"#3a8fff":"#ff4d4d";
      const lbl = cur.t===0?"🔵 Mavi":"🔴 Kırmızı";
      return `<div style="margin-bottom:10px;padding:18px;border-radius:10px;
        background:#0a0a18;border:1px solid #ff444422;text-align:center">
        <div style="font-size:20px;margin-bottom:6px">🚫</div>
        <div style="font-size:11px;font-weight:800;color:#ff6060;letter-spacing:1px">BAN AŞAMASI</div>
        <div style="font-size:9px;color:#333;margin-top:4px">${lbl} ban yapıyor — öneri yok</div>
      </div>`;
    }
    const lastEn = getEnPicks(cur.t);
    const last   = lastEn.length ? lastEn[lastEn.length-1] : null;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <div class="pulse" style="width:6px;height:6px;border-radius:3px;background:#ffcc02"></div>
        <span style="font-size:9px;font-weight:800;color:#ffcc02;letter-spacing:2px">ÖNERİ PANELİ</span>
        ${cur.t===0
          ?`<span style="font-size:9px;color:#3a8fff;font-weight:700;margin-left:4px">▶ Mavi için</span>`
          :`<span style="font-size:9px;color:#ff4d4d;font-weight:700;margin-left:4px">▶ Kırmızı için</span>`}
      </div>

      <div style="display:grid;grid-template-columns:1fr;gap:8px">

        <!-- BÖLÜM 1: CT -->
        <div style="background:#0a0a18;border:1px solid #ff303033;border-radius:10px;padding:10px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px">
            <span style="font-size:10px;font-weight:800;color:#ff6060">🚨 1. Koridor CT Önerisi</span>
            ${last?`<span style="font-size:8px;padding:1px 7px;border-radius:4px;
              background:#ff303020;border:1px solid #ff303050;color:#ff9090;margin-left:auto">
              vs ${last.name} (${last.lanes?.[0]})
            </span>`:""}
          </div>
          ${sugg.ct.length
            ? sugg.ct.map(c=>cardH(c,"#ff6060")).join("")
            : `<div style="font-size:11px;color:#333;text-align:center;padding:16px">
                ${last?"Rakip seçime göre CT bulunamadı":"Rakip henüz pick yapmadı"}
              </div>`}
        </div>

        <!-- BÖLÜM 2: META -->
        <div style="background:#0a0a18;border:1px solid #ffcc0233;border-radius:10px;padding:10px">
          <div style="font-size:10px;font-weight:800;color:#ffcc02;margin-bottom:7px">🌟 2. Meta Güç Pickleri</div>
          ${sugg.meta.length
            ? sugg.meta.map(c=>cardH(c,"#ffcc02")).join("")
            : `<div style="font-size:11px;color:#333;text-align:center;padding:16px">Yeterli veri yok</div>`}
        </div>

        <!-- BÖLÜM 3: BOŞ KORİDOR -->
        <div style="background:#0a0a18;border:1px solid #a020f033;border-radius:10px;padding:10px">
          <div style="font-size:10px;font-weight:800;color:#c060ff;margin-bottom:7px">🗺️ 3. Boş Koridor Tamamlayıcı</div>
          ${sugg.filler.length
            ? sugg.filler.map(c=>cardH(c,"#c060ff")).join("")
            : `<div style="font-size:11px;color:#333;text-align:center;padding:16px">Tüm koridorlar dolu</div>`}
        </div>

      </div>
    </div>`;
  }

  // ── Uyarılar ─────────────────────────────────────────────
  function warnsH() {
    if (!sugg.warns.length) return "";
    return `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
      ${sugg.warns.map(w=>`<div class="warn" style="
        padding:6px 12px;border-radius:6px;font-size:10px;font-weight:800;
        background:linear-gradient(135deg,#E8405722,#8B000022);
        border:1px solid #E8405766;color:#ff8080">${w}</div>`).join("")}
    </div>`;
  }

  // ── Şampiyon havuzu ──────────────────────────────────────
  function poolH() {
    const sugIds = new Set([
      ...sugg.ct.map(c=>c.id),
      ...sugg.meta.map(c=>c.id),
      ...sugg.filler.map(c=>c.id),
    ]);
    const list = ALL.filter(c=>{
      if (used.has(c.id)) return false;
      if (lane!=="Tümü" && !c.lanes.includes(lane)) return false;
      if (search && !c.name.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    }).sort((a,b) => a.name.localeCompare(b.name, "tr"));

    const tabs = LANES.map(l=>{
      const lc = LANE_COLOR[l]||"#4da6ff";
      const act= lane===l;
      return `<button onclick="setLane('${l}')" style="
        padding:6px 12px;border-radius:20px;font-size:10px;font-weight:700;
        background:${act?lc+"30":"#0f0f1e"};border:1px solid ${act?lc+"88":"#1a1a2e"};
        color:${act?lc:"#444"};white-space:nowrap">${l}</button>`;
    }).join("");

    const rows = list.map(c=>{
      const isSug = sugIds.has(c.id);
      const lc    = LANE_COLOR[c.lanes?.[0]]||"#888";
      return `<div onclick="pickChamp('${c.id}')" style="
        display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;
        background:${isSug?"#ffcc0210":"#0d0d1e"};border:1px solid ${isSug?"#ffcc0240":"#141428"};
        margin-bottom:5px;cursor:pointer;transition:border-color .12s;
      " onmouseenter="this.style.borderColor='${lc}'" onmouseleave="this.style.borderColor='${isSug?"#ffcc0240":"#141428"}'">
        <div style="width:42px;height:42px;border-radius:8px;overflow:hidden;flex-shrink:0;
          background:#080816;border:1px solid #1a1a2e">
          ${champImg(c.id, 42)}
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:700;color:#e0e0f0">${c.name}</span>
            ${isSug?`<span style="font-size:7px;padding:1px 5px;border-radius:3px;
              background:#ffcc0222;border:1px solid #ffcc0244;color:#ffcc02;font-weight:800">★ ÖNERİ</span>`:""}
            ${patchBadge(c.id)}
          </div>
          <div style="font-size:9px;color:${lc};margin-top:1px">${c.lanes?.join(" · ")} · ${c.cls} · ${c.dmg}</div>
        </div>
        <div style="padding:5px 10px;border-radius:6px;font-size:10px;font-weight:700;
          background:${tc}18;border:1px solid ${tc}44;color:${tc};flex-shrink:0">SEÇ</div>
      </div>`;
    }).join("") || `<div style="text-align:center;padding:30px;color:#333;font-size:12px">Şampiyon bulunamadı</div>`;

    return `<div style="background:#0d0d1e;border:1px solid #1a1a2e;border-radius:10px;padding:10px;margin-bottom:10px">
      <div style="font-size:9px;font-weight:800;color:#666;letter-spacing:2px;margin-bottom:8px">ŞAMPİYON HAVUZU</div>
      <input type="text" id="poolSearch" placeholder="Ara..." value="${search}"
        oninput="doSearch(this.value)" autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false"
        style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid #252540;
        background:#080816;color:#e0e0f0;font-size:16px;outline:none;margin-bottom:8px"/>
      <div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px">${tabs}</div>
      <div id="poolList" style="max-height:320px;overflow-y:auto">${rows}</div>
    </div>`;
  }

  // ── Draft sonu kompozisyon özeti ─────────────────────────
  function doneH() {
    function panel(team, col, lbl) {
      const picks = getMyPicks(team);
      const ap  = picks.filter(c=>["AP","Hybrid"].includes(c.dmg)).length;
      const ad  = picks.filter(c=>["AD","Hybrid"].includes(c.dmg)).length;
      const tk  = picks.filter(c=>["Tank","Fighter"].includes(c.cls)).length;
      function bar(label,val,bc){
        return `<div style="margin-bottom:5px">
          <div style="display:flex;justify-content:space-between;font-size:8px;margin-bottom:2px">
            <span style="color:#444">${label}</span><span style="color:${bc}">${val}/5</span>
          </div>
          <div style="height:4px;border-radius:2px;background:#1a1a2e">
            <div style="height:100%;border-radius:2px;width:${(val/5)*100}%;background:${bc}"></div>
          </div>
        </div>`;
      }
      const warns=[];
      if(ap<1)warns.push(`<span style="font-size:7px;padding:2px 6px;border-radius:4px;background:#80cbc418;border:1px solid #80cbc440;color:#80cbc4">⚠ AP Yok</span>`);
      if(ad<1)warns.push(`<span style="font-size:7px;padding:2px 6px;border-radius:4px;background:#ef9a9a18;border:1px solid #ef9a9a40;color:#ef9a9a">⚠ AD Yok</span>`);
      if(tk<1)warns.push(`<span style="font-size:7px;padding:2px 6px;border-radius:4px;background:#4fc3f718;border:1px solid #4fc3f740;color:#4fc3f7">⚠ Tank/Ön Hat Yok</span>`);
      if(ap>=1&&ad>=1&&tk>=1)warns.push(`<span style="font-size:7px;padding:2px 6px;border-radius:4px;background:#60ff8018;border:1px solid #60ff8040;color:#60ff80">✓ Dengeli</span>`);
      return `<div style="background:#0d0d1e;border:1px solid ${col}28;border-radius:10px;padding:10px">
        <div style="font-size:9px;font-weight:800;color:${col};letter-spacing:1.5px;
          border-bottom:1px solid ${col}22;padding-bottom:5px;margin-bottom:8px">${lbl}</div>
        ${picks.map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 7px;
          border-radius:7px;background:#111120;margin-bottom:4px">
          <div style="width:32px;height:32px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#080816">
            ${champImg(c.id,32)}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:700;color:#e0e0f0;
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
            <div style="font-size:8px;color:${LANE_COLOR[c.lanes?.[0]]||"#888"}">${c.lanes?.[0]} · ${c.cls}</div>
          </div>
        </div>`).join("")}
        <div style="margin-top:8px;padding:7px;background:#080816;border-radius:7px">
          ${bar("AP",ap,"#80cbc4")}${bar("AD",ad,"#ef9a9a")}${bar("Ön Hat",tk,"#4fc3f7")}
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">${warns.join("")}</div>
        </div>
      </div>`;
    }
    return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      ${panel(0,"#3a8fff","🔵 MAVİ")}
      ${panel(1,"#ff4d4d","🔴 KIRMIZI")}
    </div>
    ${seriesFormat===1?`<button onclick="doReset()" style="width:100%;padding:13px;border-radius:10px;
      font-size:13px;font-weight:800;letter-spacing:1px;
      background:linear-gradient(135deg,#3a8fff18,#a020f018);
      border:1px solid #a020f044;color:#c060ff">🔄 Yeni Draft Başlat</button>`:""}`;
  }

  // Maç özet kartı
  function matchSummaryH(m, idx) {
    const bPicks = ORDER.map((o,i)=>({...o,i})).filter(o=>o.t===0&&o.act==="pick").map(o=>m.slots[o.i]).filter(Boolean);
    const rPicks = ORDER.map((o,i)=>({...o,i})).filter(o=>o.t===1&&o.act==="pick").map(o=>m.slots[o.i]).filter(Boolean);
    return `<div style="background:#0d0d1e;border:1px solid #1a1a2e;border-radius:10px;padding:10px;margin-bottom:6px">
      <div style="font-size:9px;color:#555;letter-spacing:1px;margin-bottom:6px">MAÇ ${idx+1}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div>
          <div style="font-size:8px;color:#3a8fff;margin-bottom:4px">🔵 MAVİ</div>
          ${bPicks.map(c=>`<div style="font-size:10px;color:#aaa;padding:2px 0">${c.name}</div>`).join("")}
        </div>
        <div>
          <div style="font-size:8px;color:#ff4d4d;margin-bottom:4px">🔴 KIRMIZI</div>
          ${rPicks.map(c=>`<div style="font-size:10px;color:#aaa;padding:2px 0">${c.name}</div>`).join("")}
        </div>
      </div>
    </div>`;
  }

  document.getElementById("app").innerHTML = `
    <!-- HEADER -->
    <div style="display:flex;align-items:center;justify-content:space-between;
      padding:10px 12px;border-bottom:1px solid #141428;background:#0a0a18;
      position:sticky;top:0;z-index:30;padding-top:max(10px,env(safe-area-inset-top))">
      <div style="min-width:0;flex:1">
        <div style="font-weight:800;font-size:13px;letter-spacing:1px;color:#fff">⚔️ WILD RIFT DRAFT</div>
        <div style="font-size:9px;color:#444;margin-top:1px;display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <span>Bo${seriesFormat}${fearless?" · Fearless":""}</span>
          ${patchData.version?`<span style="color:#ffcc02;font-weight:700">· ${patchData.version}</span>`:""}
          ${mySide!==null?`<span style="color:${mySide===0?"#3a8fff":"#ff4d4d"}">${mySide===0?"🔵":"🔴"} Sen</span>`:""}
          ${opponentName?`<span style="color:#555">vs ${opponentName}</span>`:""}
          ${seriesFormat>1?`<span style="color:#3ad48f">Sen ${myScore}</span><span style="color:#444">—</span><span style="color:#ff4d4d">${oppScore} Rakip</span>`:""}
          ${seriesFormat>1?`<span style="color:#333">Maç ${currentMatch}</span>`:""}
        </div>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        <button onclick="doUndo()" ${step===0?"disabled":""} style="padding:6px 10px;border-radius:6px;
          font-size:11px;font-weight:700;background:#131328;border:1px solid #252540;
          color:#888;opacity:${step===0?.4:1}">↩</button>
        <button onclick="doReset()" style="padding:6px 10px;border-radius:6px;font-size:11px;
          font-weight:700;background:#1a0a0a;border:1px solid #ff444466;color:#ff6060">↺</button>
        <button onclick="saveDraftAndFinish()" style="padding:6px 10px;border-radius:6px;font-size:11px;
          font-weight:700;background:#0a180a;border:1px solid #44ff6644;color:#60ff80"
          title="Taslağı Kaydet ve Bitir">💾</button>
        <button onclick="doResetSeries()" style="padding:6px 10px;border-radius:6px;font-size:11px;
          font-weight:700;background:#0a0a1a;border:1px solid #4da6ff44;color:#4da6ff">☰</button>
      </div>
    </div>

    <!-- PHASE BANDİ -->
    ${!done?`<div style="padding:7px 12px;display:flex;align-items:center;gap:6px;
      background:${tc}11;border-bottom:1px solid #141428">
      <span style="padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;
        background:${cur.ph===1?"#4da6ff22":"#a020f022"};
        border:1px solid ${cur.ph===1?"#4da6ff55":"#a020f055"};
        color:${cur.ph===1?"#4da6ff":"#c060ff"}">PHASE ${cur.ph}</span>
      <span style="padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;
        background:${cur.act==="ban"?"#ff444422":"#44ff6622"};
        border:1px solid ${cur.act==="ban"?"#ff444455":"#44ff6655"};
        color:${cur.act==="ban"?"#ff6060":"#60ff80"}">${cur.act==="ban"?"🚫 BAN":"✅ PİCK"}</span>
      <span style="font-size:11px;font-weight:700;color:${tc}">${cur.t===0?"🔵 MAVİ":"🔴 KIRMIZI"}</span>
      <span style="font-size:10px;color:#444;margin-left:auto">${step+1}/20</span>
    </div>`
    :`<div style="padding:9px;text-align:center;font-size:12px;font-weight:800;color:#c060ff;
      letter-spacing:2px;background:linear-gradient(90deg,#a020f018,#3a8fff18);
      border-bottom:1px solid #a020f033">🏆 DRAFT TAMAMLANDI</div>`}

    <!-- ANA İÇERİK -->
    <div style="padding:10px 10px ${done?"10px":"80px"}">

      <!-- TAKIM BOARD -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        ${teamH("#3a8fff","🔵 MAVİ",B0,P0)}
        ${teamH("#ff4d4d","🔴 KIRMIZI",B1,P1)}
      </div>

      <!-- UYARILAR -->
      ${warnsH()}

      <!-- ÖNERİLER -->
      ${!done ? suggH() : ""}

      <!-- BUILD PANELİ -->
      ${buildPanelH()}

      <!-- ŞAMPİYON HAVUZU -->
      ${!done ? poolH() : ""}

      <!-- DRAFT SONU -->
      ${done ? doneH() : ""}
      ${done && seriesFormat > 1 ? `
        <div style="margin-bottom:10px">
          <div style="font-size:9px;color:#444;letter-spacing:2px;margin-bottom:8px;text-align:center">
            MAÇ ${currentMatch} — KİM KAZANDI?
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <button onclick="endMatch(0)" style="padding:14px;border-radius:10px;font-size:13px;
              font-weight:800;background:#3a8fff22;border:1px solid #3a8fff66;color:#3a8fff">
              🔵 Mavi Kazandı
            </button>
            <button onclick="endMatch(1)" style="padding:14px;border-radius:10px;font-size:13px;
              font-weight:800;background:#ff4d4d22;border:1px solid #ff4d4d66;color:#ff4d4d">
              🔴 Kırmızı Kazandı
            </button>
          </div>
        </div>
      ` : ""}

      <!-- MAÇ GEÇMİŞİ -->
      ${matchHistory.length > 0 ? `
        <div style="margin-bottom:10px">
          <div style="font-size:9px;color:#444;letter-spacing:2px;margin-bottom:8px">MAÇ GEÇMİŞİ</div>
          ${matchHistory.map((m,i) => matchSummaryH(m,i)).join("")}
        </div>
      ` : ""}
    </div>

    <!-- ALT BUTON -->
    ${!done?`<div style="position:fixed;bottom:0;left:0;right:0;z-index:20;
      padding:10px 12px;background:#0a0a18;border-top:1px solid #181828">
      <button onclick="openModal()" style="width:100%;padding:13px;border-radius:10px;
        font-size:13px;font-weight:800;background:${tc}22;border:1px solid ${tc}66;color:${tc}">
        ${cur.act==="ban"?`🚫 ${cur.t===0?"Mavi":"Kırmızı"} — Ban Seç`:`✅ ${cur.t===0?"Mavi":"Kırmızı"} — Şampiyon Seç`}
      </button>
    </div>`:""}

    <!-- MODAL (aşağıdan açılan) -->
    ${modal&&!done?`<div id="ov" onclick="ovClick(event)" style="
      position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);
      backdrop-filter:blur(8px);display:flex;flex-direction:column">
      <div style="margin-top:auto;background:#0d0d1e;border-radius:16px 16px 0 0;
        border:1px solid #1a1a2e;border-bottom:none;max-height:85vh;
        display:flex;flex-direction:column;animation:fadeIn .2s ease">
        <div style="padding:12px 12px 8px;border-bottom:1px solid #141428">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:12px;font-weight:800;color:#fff">
              ${cur.act==="ban"?"🚫 Ban Seç":"✅ Şampiyon Seç"}
              <span style="color:${tc};font-size:10px;margin-left:8px">${cur.t===0?"(Mavi)":"(Kırmızı)"}</span>
            </span>
            <button onclick="closeModal()" style="width:30px;height:30px;border-radius:6px;
              background:#131328;border:1px solid #252540;color:#888;font-size:15px;font-weight:800">✕</button>
          </div>
          <input autofocus type="text" placeholder="Şampiyon ara..." value="${search}"
            oninput="doSearch(this.value)"
            style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #252540;
            background:#080816;color:#e0e0f0;font-size:13px;outline:none;margin-bottom:8px"/>
          <div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:2px">
            ${LANES.map(l=>{
              const lc=LANE_COLOR[l]||"#4da6ff"; const act=lane===l;
              return `<button onclick="setLane('${l}')" style="padding:5px 11px;border-radius:20px;
                font-size:10px;font-weight:700;white-space:nowrap;
                background:${act?lc+"30":"#111120"};border:1px solid ${act?lc+"88":"#1e1e30"};
                color:${act?lc:"#555"}">${l}</button>`;
            }).join("")}
          </div>
        </div>
        <div style="overflow-y:auto;padding:8px 10px;flex:1">${poolH().replace(/<div style="background:#0d0d1e.*?<\/div>\s*$/s,"")}</div>
      </div>
    </div>`:""}
  `;

  if (modal) setTimeout(()=>{const el=document.querySelector("input[autofocus]");if(el)el.focus();},60);
}

// ─── EVENT HANDLERS ──────────────────────────────────────────
let buildPanelId = null; // hangi şampiyonun build'i açık

function slotClick(i){
  const slot = slots[i];
  if (slot && BUILD_DB[slot.id]) {
    // Dolu slot + build var → build panelini toggle et
    buildPanelId = buildPanelId === slot.id ? null : slot.id;
    render();
  } else if(i===step){
    modal=true; render();
  }
}
function openModal() { modal=true;render(); }
function closeModal(){ modal=false;render(); }
function ovClick(e)  { if(e.target.id==="ov")closeModal(); }
function setLane(l) {
  lane=l;
  doSearch(search);
}
function doSearch(v) {
  search=v;
  const poolEl = document.getElementById("poolList");
  const used = getUsed();
  const sugg = computeSugg();
  const sugIds = new Set([
    ...sugg.ct.map(c=>c.id),
    ...sugg.meta.map(c=>c.id),
    ...sugg.filler.map(c=>c.id),
  ]);
  const cur = step < ORDER.length ? ORDER[step] : null;
  const tc = cur ? (cur.t===0?"#3a8fff":"#ff4d4d") : "#888";
  const list = ALL.filter(c=>{
    if (used.has(c.id)) return false;
    if (lane!=="Tümü" && !c.lanes.includes(lane)) return false;
    if (v && !c.name.toLowerCase().includes(v.toLowerCase())) return false;
    return true;
  }).sort((a,b) => a.name.localeCompare(b.name, "tr"));
  if (!poolEl) { render(); return; }
  const lc_map = {Baron:"#ef9a9a",Jungle:"#a5d6a7",Mid:"#80cbc4",ADC:"#ffcc02",Support:"#ce93d8"};
  poolEl.innerHTML = list.map(c=>{
    const isSug = sugIds.has(c.id);
    const lc = lc_map[c.lanes?.[0]]||"#888";
    return `<div onclick="pickChamp('${c.id}')" style="
      display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;
      background:${isSug?"#ffcc0210":"#0d0d1e"};border:1px solid ${isSug?"#ffcc0240":"#141428"};
      margin-bottom:5px;cursor:pointer;">
      <div style="width:42px;height:42px;border-radius:8px;overflow:hidden;flex-shrink:0;
        background:#080816;border:1px solid #1a1a2e">
        ${champImg(c.id,42)}
      </div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:13px;font-weight:700;color:#e0e0f0">${c.name}</span>
          ${isSug?'<span style="font-size:7px;padding:1px 5px;border-radius:3px;background:#ffcc0222;border:1px solid #ffcc0244;color:#ffcc02;font-weight:800">★ ÖNERİ</span>':""}
        </div>
        <div style="font-size:9px;color:${lc};margin-top:1px">${c.lanes?.join(" · ")} · ${c.cls} · ${c.dmg}</div>
      </div>
      <div style="padding:5px 10px;border-radius:6px;font-size:10px;font-weight:700;
        background:${tc}18;border:1px solid ${tc}44;color:${tc};flex-shrink:0">SEÇ</div>
    </div>`;
  }).join("") || '<div style="text-align:center;padding:30px;color:#333;font-size:12px">Şampiyon bulunamadı</div>';
}

function pickChamp(id){
  if(step>=ORDER.length)return;
  const c=DB[id]; if(!c)return;
  const used=getUsed(); if(used.has(id))return;
  slots[step]={id,...c};
  step++; search=""; modal=false;
  render();
}
function doUndo(){
  if(step===0)return;
  slots[step-1]=null; step--;
  render();
}
function doReset(){
  slots=Array(20).fill(null); step=0;
  lane="Tümü"; search=""; modal=false;
  render();
}
function doResetSeries(){
  slots=Array(20).fill(null); step=0;
  lane="Tümü"; search=""; modal=false;
  seriesFormat=null; fearless=false; setupPhase=false;
  currentMatch=1; matchHistory=[];
  myScore=0; oppScore=0;
  mySide=null; opponentName="Rakip Takım";
  appScreen="home";
  render();
}

// Yeni: Format seçimi (kurulum aşamasına geç)
function selectFormat(format, fc){
  seriesFormat=format; fearless=fc;
  currentMatch=1; matchHistory=[];
  myScore=0; oppScore=0;
  slots=Array(20).fill(null); step=0;
  mySide=null; opponentName="Rakip Takım";
  setupPhase=true;
  render();
}

// Yeni: Taraf seçimi
function selectSide(side){
  mySide=side;
  render();
}

// Yeni: Kurulumu onayla ve taslağa geç
function confirmSetup(){
  if(mySide===null)return;
  const inp=document.getElementById("opponentInput");
  if(inp) opponentName=inp.value||"Rakip Takım";
  setupPhase=false;
  render();
}

// Eski startSeries korundu (fearless butonları için)
function startSeries(format, fc){
  selectFormat(format, fc);
}

function endMatch(winner){ // 0=mavi, 1=kırmızı (o maçtaki kazanan taraf)
  const iWon = winner === mySide;
  matchHistory.push({slots:[...slots], myScore, oppScore, mySide, iWon, opponentName,
    format:seriesFormat, date:new Date().toLocaleString("tr-TR")});
  // localStorage'a da kaydet
  savedMatchHistory.push({slots:[...slots], myScore, oppScore, mySide, iWon, opponentName,
    format:seriesFormat, date:new Date().toLocaleString("tr-TR")});
  saveHistory();
  if(iWon) myScore++;
  else oppScore++;
  const needed = seriesFormat===1?1:seriesFormat===3?2:3;
  if(myScore>=needed || oppScore>=needed){
    slots=Array(20).fill(null); step=0; modal=false;
    render(); return;
  }
  currentMatch++;
  // Bo3/Bo5'te sonraki maç için taraf seçimi ekranına dön
  slots=Array(20).fill(null); step=0; modal=false;
  mySide=null; setupPhase=true;
  render();
}

// Yeni: Taslağı kaydet ve bitir butonu (💾)
function saveDraftAndFinish(){
  const entry = {
    slots:[...slots], myScore, oppScore, mySide, opponentName,
    format:seriesFormat, date:new Date().toLocaleString("tr-TR"),
    partial: step < ORDER.length
  };
  savedMatchHistory.push(entry);
  saveHistory();
  // Başarı bildirimi
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent="✓ Kaydedildi";
  btn.style.color="#60ff80";
  btn.style.borderColor="#60ff8055";
  setTimeout(()=>{ btn.textContent=orig; btn.style.color="#60ff80"; },1500);
}

// Yeni: Geçmiş sil
function deleteHistory(idx){
  savedMatchHistory.splice(idx,1);
  saveHistory();
  render();
}

// Yeni: Tümünü sil
function clearAllHistory(){
  if(!confirm("Tüm geçmiş silinsin mi?"))return;
  savedMatchHistory=[];
  saveHistory();
  render();
}

function toggleFearless(){
  fearless=!fearless;
  render();
}

// Klavye kapanmasın — sadece grid'i güncelle
function updateChampGrid() {
  const grid = document.getElementById("champGrid");
  if (!grid) return;
  const lc_map = {Baron:"#ef9a9a",Jungle:"#a5d6a7",Mid:"#80cbc4",ADC:"#ffcc02",Support:"#ce93d8"};
  const seen = new Map();
  ALL.forEach(c => {
    if (!seen.has(c.name)) seen.set(c.name, {...c, allIds:[c.id], allLanes:[...c.lanes]});
    else {
      const ex = seen.get(c.name);
      ex.allIds.push(c.id);
      c.lanes.forEach(l => { if (!ex.allLanes.includes(l)) ex.allLanes.push(l); });
    }
  });
  const list = [...seen.values()]
    .filter(c => {
      if (champLane !== "Tümü" && !c.allLanes.includes(champLane)) return false;
      if (champSearch && !c.name.toLowerCase().includes(champSearch.toLowerCase())) return false;
      return true;
    })
    .sort((a,b) => a.name.localeCompare(b.name, "tr"));

  grid.innerHTML = list.map(c => {
    const lc = lc_map[c.allLanes[0]]||"#888";
    const flex = c.allLanes.length > 1;
    return `<div onclick="openChampDetail('${c.id}','champions')"
      style="background:#0d0d1e;border:1px solid #1a1a2e;border-radius:12px;
      padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;
      cursor:pointer;position:relative">
      ${flex?`<div style="position:absolute;top:5px;right:5px;font-size:7px;
        padding:1px 5px;border-radius:4px;background:#ffcc0220;
        border:1px solid #ffcc0244;color:#ffcc02;font-weight:800">FLEX</div>`:""}
      <div style="width:56px;height:56px;border-radius:10px;overflow:hidden;border:1px solid ${lc}44">
        ${champImg(c.id,56)}
      </div>
      <div style="font-size:10px;font-weight:700;color:#e0e0f0;text-align:center;
        word-break:break-word;line-height:1.3">${c.name} ${patchBadge(c.id,true)}</div>
      <div style="font-size:8px;color:${lc}">${c.allLanes.join(" · ")}</div>
    </div>`;
  }).join("");
}

// İlk render — son bırakılan ekran (varsa) geri yüklenir, yoksa Ana Menü
loadAppState();
render();
</script>
</body>
